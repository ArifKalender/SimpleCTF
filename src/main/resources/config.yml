SimpleCTF:
  Game:
    Queue:
      MaxPlayersPerTeam: 8
      MinPlayersPerTeam: 1
    Match:
      MatchTime: 600
      WinScore: 3
      FlagBaseRadius: 4
      ResetMatchAfterScore: true
      StarterKit:
        Enabled: true
        Items:
          - WOODEN_SWORD:1
          - LEATHER_HELMET:1
          - LEATHER_CHESTPLATE:1
          - LEATHER_LEGGINGS:1
          - LEATHER_BOOTS:1
          - COOKED_BEEF:4
  Strings:
    Prefix: "<bold><#eb6434>SimpleCTF <reset><#e8cd33>» "
    BossBarText: "<red>Red score: <green>%red_score% <reset>| <blue>Blue score: <green>%blue_score%"
    Warnings:
      NoPermission: "<red>You don't have the permission to execute that command!"
      NoFriendlyFire: "You can not attack your teammates!"
      WrongBannerTeam: "You cannot break that flag!"
      IncorrectSyntax: "That's an invalid command, are you sure you typed that correctly?"
    Queue:
      TeamJoin: "You joined the %color% team!"
      TeamLeave: "You left the team."
      PlayerJoinedTeam: "%player% joined the %color% queue!"
      PlayerLeftTeam: "%player% left the queue."
      AlreadyInQueue: "You are already in a queue! Use /ctf leave"
      TeamAlreadyFull: "Sorry, but that team is full!"
      NotInTeam: "You are not in a team."
    Match:
      MatchWin: "The %color% team won the match!"
      MatchTimeOut: "The match ran out of time!"
      MatchStart: "<bold>The match just started!"
      PlayerCaughtFlag: "%player% CAUGHT THE %color% FLAG!"
      PlayerReturnFlag: "SCORE! %player% returned with %opposite_color% team's flag to their base!"
      PlayerPlaceFlag: "%player% placed back their flag!"
      FlagWasSaved: "%color% flag was saved!"
      MatchOccupied: "There already is a match going on in this server, sorry!"
      CurrentScore: "Blue score: %blue_score% | Red score: %red_score%"
      FlagDroppedAt: "%player% dropped %color% flag at %coordinates%!"